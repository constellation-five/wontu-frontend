<app-pane>
  <h2 class="page-title mat-text-on-surface" style="font: var(--mat-sys-title-large);">Payment Methods</h2>

  @if (isLoading()) {
    <div class="loading-state">Loading data...</div>
  } @else {
    <div class="payment-methods-content">
      @if (paymentMethods().length > 0) {
        <div class="methods-list">
          @for (method of paymentMethods(); track method.payment_method_id) {
            <payment-method-card
              [method]="method"
              [showEdit]="true"
              [isMobile]="isMobile()"
              (edit)="openEditModal($event)" />
          }
        </div>
      } @else {
        <div class="empty-state">
          <img src="assets/img/wontusad.svg" alt="No Data" class="empty-image">
          <div class="empty-text">
            <p>No payment methods yet.</p>
            <p>Add some!</p>
          </div>
        </div>
      }

      <button
        matButton="filled"
        appButtonSize="sm"
        appButtonColor="primary"
        class="add-button"
        (click)="openAddModal()">
        <mat-icon fontSet="material-symbols-outlined">add</mat-icon>
        <span>Add payment method</span>
      </button>
    </div>
  }
</app-pane>
