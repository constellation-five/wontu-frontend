<div class="auth-layout-container">
  <div class="auth-layout-background"></div>

  <svg
    class="auth-layout-bg-svg"
    preserveAspectRatio="none"
    viewBox="0 0 1200 800"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path d="M 0 0 L 1200 0 L 1200 350 Q 600 550 0 350 Z" />
  </svg>

  <main class="auth-layout-main">
    <app-pane class="auth-pane">
      <div class="auth-pane-inner">
        <div class="auth-logo-section">
          <img src="/assets/img/wontulogo.svg" alt="Wontu Logo" class="auth-logo light" />
          <img src="/assets/img/wontulogo-dark.svg" alt="Wontu Logo" class="auth-logo dark" />
        </div>

        <div class="auth-content-section">
          <ng-content></ng-content>
        </div>
      </div>
    </app-pane>
  </main>
</div>
