<main class="flex min-h-screen flex-col items-center justify-center bg-(--mat-sys-surface) p-4">
  <div class="w-full max-w-md rounded-2xl bg-(--mat-sys-surface-container) p-8 shadow-sm">
    <div class="mb-6 flex flex-col items-center text-center">
      <h1 class="text-2xl font-bold tracking-tight text-(--mat-sys-on-surface)">
        Complete Registration
      </h1>
      <p class="text-sm text-(--mat-sys-on-surface-variant)">
        Welcome, {{ googleUser?.name }}! Pick a username to continue.
      </p>
    </div>

    @if (error()) {
      <div class="p-3 mb-4 bg-red-100 text-red-700 rounded-md text-sm">
        {{ error() }}
      </div>
    }

    <form (submit)="submit($event)" class="flex flex-col gap-4">
      <mat-form-field appearance="outline" class="w-full!">
        <mat-label>Username</mat-label>
        <input matInput [formField]="form.username" placeholder="Enter a unique username" />
        @if (form.username().invalid() && form.username().touched()) {
          <mat-error>Username is required</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button class="h-12! w-full!" type="submit" [disabled]="form().invalid()">
        Complete Sign Up
      </button>
    </form>
  </div>
</main>
