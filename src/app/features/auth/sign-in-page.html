<main class="flex min-h-screen flex-col items-center justify-center bg-(--mat-sys-surface) p-4">
  <div class="w-full max-w-md rounded-2xl bg-(--mat-sys-surface-container) p-8 shadow-sm">
    <div class="mb-4 flex flex-col items-center gap-4">
      <img src="/assets/img/wontulogo.svg" alt="Wontu Logo" class="h-24 w-24 object-contain" />
      <h1 class="text-2xl font-bold tracking-tight text-(--mat-sys-on-surface)">Sign In</h1>
      <p class="text-center text-sm text-(--mat-sys-on-surface-variant) mb-4">
        Welcome back! Please sign in with your Google account.
      </p>
    </div>

    <button mat-flat-button class="w-full! h-12! text-base! mb-6" (click)="signInWithGoogle()">
      <mat-icon fontSet="material-symbols-outlined">login</mat-icon>
      Sign in with Google
    </button>

    <p class="text-center text-xs text-(--mat-sys-on-surface-variant)">
      By signing in, you agree to our
      <a routerLink="/terms" class="text-(--mat-sys-primary) hover:underline">Terms of Service</a>
      and
      <a routerLink="/privacy" class="text-(--mat-sys-primary) hover:underline">Privacy Policy</a>.
    </p>
  </div>
</main>
