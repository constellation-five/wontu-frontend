@if (isLoading()) {
  <div class="loading-container">
    <mat-spinner></mat-spinner>
  </div>
} @else if (isSeller()) {
  <app-manage-offer-page [offerInput]="offer()!" />
} @else if (view() === 'checkout') {
  <app-offer-checkout-view
    [offer]="offer()!"
    [myOrder]="myOrder()"
    [cartItems]="cartItems()"
    [totalPrice]="totalPrice()"
    [paymentMethods]="paymentMethods()"
    [dummyPaymentMethod]="dummyPaymentMethod"
    [proofOfPayment]="proofOfPayment()"
    [progressItems]="progressItems()"
    [currentProgressStep]="currentProgressStep()"
    [isOfferClosed]="isOfferClosed()"
    (openChat)="openChat()"
    (editOrder)="editOrder()"
    (cancelOrder)="openCancelOrderDialog()"
    (completePayment)="completePayment()"
    (fileSelected)="onFileSelected($event)"
    (proofOfPaymentClear)="proofOfPayment.set(null)"
    (drop)="onDrop($event)"
  />
} @else {
  <app-offer-menu-view
    [offer]="offer()!"
    [sortedItems]="sortedItems()"
    [cartItems]="cartItems()"
    [totalItems]="totalItems()"
    [totalPrice]="totalPrice()"
    (addToCart)="onAddToCart($event)"
    (increaseQuantity)="onIncreaseQuantity($event)"
    (decreaseQuantity)="onDecreaseQuantity($event)"
    (editCartItemNotes)="editCartItemNotes($event)"
    (placeOrder)="onPlaceOrder()"
    (openChat)="openChat()"
    (navigateToMobileCart)="navigateToMobileCart()"
  />
}
