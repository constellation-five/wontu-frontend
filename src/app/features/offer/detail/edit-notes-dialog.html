<app-dialog i18n-title title="Add Notes" [buttons]="buttons">
  <mat-form-field class="notes-field">
    <mat-label i18n>Notes</mat-label>
    <textarea
      matInput
      [(ngModel)]="notes"
      rows="4"
      maxlength="200"
      i18n-placeholder placeholder="Add your notes here..."></textarea>
    <mat-hint align="end">{{ notes.length }}/200</mat-hint>
  </mat-form-field>
</app-dialog>
