<h2 mat-dialog-title>Add Notes</h2>

<mat-dialog-content>
  <mat-form-field class="notes-field">
    <mat-label>Notes</mat-label>
    <textarea 
      matInput 
      [(ngModel)]="notes"
      rows="4"
      maxlength="200"
      placeholder="Add your notes here..."></textarea>
    <mat-hint align="end">{{ notes.length }}/200</mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
