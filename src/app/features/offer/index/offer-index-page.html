<app-main-page-header
  pageTitle="Offers"
  [location]="userLocation()"
  [searchValue]="searchQuery()"
  searchPlaceholder="Search offers"
  (locationClick)="onChangeLocation()"
  (searchValueChange)="onSearchChange($event)"
>
  <ng-container filterActions>
    <button mat-icon-button [matMenuTriggerFor]="filterMenu">
      <mat-icon fontSet="material-symbols-outlined">filter_list</mat-icon>
    </button>

    <mat-menu #filterMenu="matMenu">
      <div class="filter-menu-content" (click)="$event.stopPropagation()">
        <mat-checkbox
          [checked]="filterFood()"
          (change)="filterFood.set($event.checked)"
          class="filter-checkbox"
         i18n>
          Food
        </mat-checkbox>
        <mat-checkbox
          [checked]="filterOther()"
          (change)="filterOther.set($event.checked)"
          class="filter-checkbox"
         i18n>
          Other
        </mat-checkbox>
      </div>
    </mat-menu>
  </ng-container>
</app-main-page-header>

<!-- Offers Grid -->
@if (isLoading()) {
  <div class="loading-container">
    <p class="mat-font-body-lg mat-text-on-surface-variant" i18n>Loading offers...</p>
  </div>
} @else if (filteredOffers().length > 0) {
  <div class="offers-grid">
    @for (offer of filteredOffers(); track offer.offer_id) {
      <app-product-card
        [imageUrl]="offer.items[0]?.image_url || ''"
        [title]="offer.merchant_name || 'Unknown Merchant'"
        [category]="offer.category"
        [subtitle]="'Arrives ' + (offer.arrival_time | naturalDateTime)"
        [price]="getPriceRange(offer)"
        [stockText]="'Stock: ' + getStockLeft(offer) + ' left'"
        [clickable]="true"
        (cardClick)="onCardClick(offer.offer_id)"
      >
        <!-- Arrow Icon Button -->
        <button
          matIconButton
          appIconButtonVariant="tonal"
          cardAction
          (click)="onCardClick(offer.offer_id)"
          i18n-aria-label aria-label="View Offer"
        >
          <mat-icon fontSet="material-symbols-outlined">arrow_forward</mat-icon>
        </button>
      </app-product-card>
    }
  </div>
} @else {
  <div class="empty-state">
    <mat-icon fontSet="material-symbols-outlined" class="empty-icon">inbox</mat-icon>
    <p class="mat-font-body-lg mat-text-on-surface-variant" i18n>No offers available</p>
  </div>
}

<!-- Floating Create Offer Button (Mobile only) -->
<button matFab (click)="openCreateOffer()" class="create-offer-fab" i18n-aria-label aria-label="Create Offer">
  <mat-icon fontSet="material-symbols-outlined">add</mat-icon>
</button>

<!-- Extended FAB for Desktop -->
<button
  matFab
  extended
  (click)="openCreateOffer()"
  class="create-offer-fab-desktop"
  i18n-aria-label aria-label="Create Offer"
>
  <mat-icon fontSet="material-symbols-outlined">add</mat-icon>
  Create Offer
</button>
