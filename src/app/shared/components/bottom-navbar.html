<nav class="bottom-nav-container" aria-label="Bottom navigation">
  <mat-nav-list class="nav-list">
    @for (link of links; track link.path) {
      @if (!isProtectedRoute(link.path) || user()) {
        <a
          mat-list-item
          [routerLink]="link.path"
          routerLinkActive
          #rla="routerLinkActive"
          class="nav-item"
          [activated]="rla.isActive"
          (click)="blurItem($event)"
        >
          <div class="nav-item-content">
            @if (link.path === '/profile' && user()?.avatar && !avatarError()) {
              <img
                [src]="user()?.avatar"
                alt="Avatar"
                (error)="onAvatarError()"
                class="user-avatar"
                [class.user-avatar-active]="rla.isActive"
              />
            } @else {
              <mat-icon
                matListItemIcon
                fontSet="material-symbols-outlined"
                class="nav-icon"
                [class.nav-icon-filled]="rla.isActive"
              >
                {{ link.icon }}
              </mat-icon>
            }
            <span class="nav-item-label">{{ link.label }}</span>
          </div>
        </a>
      }
    }
  </mat-nav-list>
</nav>
