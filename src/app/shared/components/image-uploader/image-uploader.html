<div class="relative w-full overflow-hidden" 
     [style.height]="height"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave($event)"
     (drop)="onDrop($event)">

  @if (imageUrl) {
    <div class="relative w-full h-full rounded-2xl border border-gray-200 overflow-hidden shadow-sm group cursor-pointer"
         (click)="openPreview($event)">
      
      <img [src]="imageUrl" class="w-full h-full object-cover rounded-xl">
      
      <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-10 rounded-xl">
        <mat-icon fontSet="material-symbols-outlined" class="text-white">zoom_out_map</mat-icon>
      </div>
      
      @if (editable) {
        <button type="button" (click)="removeImage($event)" class="absolute top-2 right-2 bg-white/90 rounded-full p-1 shadow-sm text-red-500 hover:bg-red-50 transition z-20">
          <mat-icon fontSet="material-symbols-outlined" class="!text-[18px] !w-[18px] !h-[18px]">close</mat-icon>
        </button>
      }
    </div>
  } 
  
  @else if (editable) {
    <input type="file" #fileInput hidden accept="image/png, image/jpeg, image/jpg" (change)="onFileChange($event)">
    
    <div (click)="fileInput.click()" 
         class="w-full h-full bg-[#f9fafb] rounded-2xl flex flex-col items-center justify-center text-center cursor-pointer overflow-hidden transition-all duration-200 border-2"
         [ngClass]="isDragOver() ? 'border-[#204ece] bg-blue-50' : 'border-transparent'">
      
      <mat-icon fontSet="material-symbols-outlined" class="text-gray-400 !text-5xl !w-12 !h-12 mb-3">add_notes</mat-icon>
      
      <div class="bg-[#e8edfc] text-[#204ece] text-xs font-semibold px-5 py-2 rounded-full mb-2">
        Browse
      </div>
      
      <p class="text-sm text-gray-500 mb-1">or drag to upload</p>
      <p class="text-[11px] text-gray-400">Format: .jpg, .jpeg, .png | Max. 3 MB</p>
    </div>
  }

  @else {
    <div class="w-full h-full rounded-lg bg-gray-50 flex items-center justify-center text-gray-400 border border-gray-100">
      <img src="https://placehold.co/100x100?text=No+Image" class="w-full h-full object-cover opacity-50 rounded-lg">
    </div>
  }
</div>

<ng-template #imagePreviewDialog>
  <div class="relative flex flex-col items-center justify-center outline-none p-4 max-w-full max-h-full">
    
    <button mat-icon-button mat-dialog-close class="absolute -top-14 right-0 !text-white bg-black/30 hover:bg-black/60 transition z-50">
      <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
    </button>
    
    <div class="relative rounded-2xl overflow-hidden shadow-2xl group bg-white p-2">
      
      <input type="file" #previewInput hidden accept="image/png, image/jpeg, image/jpg" (change)="onFileChange($event)">
      
      <img [src]="imageUrl" 
           class="max-w-[90vw] max-h-[85vh] object-contain rounded-xl" 
           [ngClass]="editable ? 'cursor-pointer' : ''"
           (click)="editable ? previewInput.click() : null">
      
      @if(editable) {
        <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/80 to-transparent p-6 text-center pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
          <span class="text-white text-sm font-medium flex items-center justify-center gap-2">
            <mat-icon fontSet="material-symbols-outlined" class="!text-[20px] !w-[20px] !h-[20px]">edit</mat-icon> Tap image to change photo
          </span>
        </div>
      }
    </div>
  </div>
</ng-template>
