<div class="bank-logo" [style.width]="size()" [style.height]="size()">
  @if (logoPath() && !imgFailed()) {
    <img
      [src]="logoPath()"
      [alt]="bankName()"
      class="logo-image"
      (error)="onImgError()" />
  } @else {
    <span class="logo-initials">{{ initials() }}</span>
  }
</div>
