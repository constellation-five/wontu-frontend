<button
  matIconButton
  appIconButtonVariant="text"
  #bellTrigger="matMenuTrigger"
  [matMenuTriggerFor]="notificationMenu"
  class="notification-button"
  (menuOpened)="onPanelOpen()"
  aria-label="Open notifications"
>
  <mat-icon
    fontSet="material-symbols-outlined"
    aria-hidden="false"
    [matBadge]="badgeContent"
    matBadgeColor="warn"
    [matBadgeHidden]="notificationService.unreadCount() === 0"
    matBadgeSize="small"
  >
    notifications
  </mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu">
  <!-- HEADER CARD -->
  <div class="notification-header-card" (click)="$event.stopPropagation()">
    <h3 class="mat-font-title-md">{{ headerText() }}</h3>
    <!--
      Always rendered (never structurally removed) so the header is the same
      height regardless of notification count — only visibility/interactivity
      toggle, not layout.
    -->
    <button
      matIconButton
      appIconButtonVariant="text"
      appButtonSize="compact"
      class="clear-all-btn"
      [class.clear-all-btn-hidden]="notificationService.notifications().length === 0"
      [disabled]="notificationService.notifications().length === 0"
      [attr.aria-hidden]="notificationService.notifications().length === 0"
      [tabIndex]="notificationService.notifications().length === 0 ? -1 : 0"
      matTooltip="Clear all"
      (click)="onClearAll()"
      aria-label="Clear all notifications"
    >
      <mat-icon fontSet="material-symbols-outlined">delete_sweep</mat-icon>
    </button>
  </div>

  <!-- CONTENT -->
  @if (notificationService.notifications().length > 0) {
    <div
      class="notification-list"
      #listEl
      [class.fade-top]="showTopFade()"
      [class.fade-bottom]="showBottomFade()"
      (click)="$event.stopPropagation()"
      (scroll)="onListScroll($event)"
    >
      <app-notification-stack [items]="items()" (dismissed)="onDismissed($event)" />
    </div>
  }
</mat-menu>
