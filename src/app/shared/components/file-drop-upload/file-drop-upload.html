<div class="file-drop-upload">
  @if (previewUrl()) {
    <div class="file-preview">
      <img 
        [src]="previewUrl()" 
        [alt]="label()" 
        class="preview-image clickable-image" 
        (click)="openImagePreview()"
      />
      <button matIconButton type="button" (click)="clear()" class="remove-file-btn">
        <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
      </button>
    </div>
  } @else {
    <div class="upload-area" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
      <mat-icon fontSet="material-symbols-outlined" class="upload-icon">note_add</mat-icon>
      <button matButton="tonal" appButtonSize="xs" type="button" (click)="fileInput.click()" i18n>
        Browse
      </button>
      <p class="mat-font-body-sm mat-text-on-surface-variant" i18n>or drag here to upload</p>
      <p class="mat-font-body-sm mat-text-on-surface-variant">
        Format: {{ accept() }} | Max. {{ maxSizeMb() }} MB
      </p>
      <input
        #fileInput
        type="file"
        [accept]="accept()"
        (change)="onFileSelected($event)"
        style="display: none"
      />
    </div>
  }
</div>
