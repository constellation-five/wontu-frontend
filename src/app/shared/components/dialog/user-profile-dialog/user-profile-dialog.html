<app-dialog [showClose]="true">
  <div class="profile-dialog">
    @if (isLoading()) {
      <div class="loading-state" i18n>Loading...</div>
    } @else if (profile(); as user) {
      <div class="profile-content">
        <div class="avatar-container">
          @if (user.avatar) {
            <img [src]="user.avatar" [alt]="user.name" class="avatar" />
          } @else {
            <div class="avatar-placeholder mat-bg-primary mat-text-on-primary">
              {{ user.name.charAt(0).toUpperCase() }}
            </div>
          }
        </div>

        <h2 class="user-name mat-font-title-lg text-bold mat-text-on-surface">{{ user.name }}</h2>

        <div class="stats">
          <div class="stat-item">
            <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface">{{
              formatNumber(user.followers_count)
            }}</span>
            <span class="stat-label mat-font-body-sm mat-text-on-surface-variant" i18n
              >Followers</span
            >
          </div>
          <div class="stat-item">
            <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface">{{
              formatNumber(user.following_count)
            }}</span>
            <span class="stat-label mat-font-body-sm mat-text-on-surface-variant" i18n
              >Following</span
            >
          </div>
          <div class="stat-item">
            <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface"
              >{{ user.average_rating }}/5</span
            >
            <span class="stat-label mat-font-body-sm mat-text-on-surface-variant" i18n>Rating</span>
          </div>
        </div>

        <div class="actions">
          <button
            [matButton]="user.is_following ? 'outlined' : 'filled'"
            [appButtonSize]="'sm'"
            [disabled]="isProcessing()"
            (click)="toggleFollow()"
            [class.following-button]="user.is_following"
            [class.follow-back-button]="!user.is_following"
            class="follow-button"
          >
            @if (user.is_following) {
              <ng-container i18n>Following</ng-container>
            } @else if (user.is_following_back) {
              <ng-container i18n>Follow Back</ng-container>
            } @else {
              <ng-container i18n>Follow</ng-container>
            }
          </button>

          <button
            matButton="tonal"
            [appButtonSize]="'sm'"
            [disabled]="isOpeningChat()"
            (click)="openChat()"
            class="chat-button"
          >
            <mat-icon fontSet="material-symbols-outlined">chat</mat-icon>
            <ng-container i18n>Chat</ng-container>
          </button>
        </div>
      </div>
    }
  </div>
</app-dialog>
