<div class="profile-dialog">
  <button mat-icon-button class="close-button" (click)="close()">
    <mat-icon fontSet="material-symbols-outlined">close</mat-icon>
  </button>

  @if (isLoading()) {
    <div class="loading-state">Loading...</div>
  } @else if (profile(); as user) {
    <div class="profile-content">
      <div class="avatar-container">
        @if (user.avatar) {
          <img [src]="user.avatar" [alt]="user.name" class="avatar">
        } @else {
          <div class="avatar-placeholder mat-bg-primary mat-text-on-primary">
            {{ user.name.charAt(0).toUpperCase() }}
          </div>
        }
      </div>

      <h2 class="user-name mat-font-title-lg text-bold mat-text-on-surface">{{ user.name }}</h2>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface">{{ formatNumber(user.followers_count) }}</span>
          <span class="stat-label mat-font-body-sm mat-text-on-surface-variant">Followers</span>
        </div>
        <div class="stat-item">
          <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface">{{ formatNumber(user.following_count) }}</span>
          <span class="stat-label mat-font-body-sm mat-text-on-surface-variant">Following</span>
        </div>
        <div class="stat-item">
          <span class="stat-value mat-font-body-lg text-bold mat-text-on-surface">{{ user.average_rating }}/5</span>
          <span class="stat-label mat-font-body-sm mat-text-on-surface-variant">Rating</span>
        </div>
      </div>

      <button
        [matButton]="user.is_following ? 'outlined' : 'filled'"
        [appButtonSize]="'md'"
        [disabled]="isProcessing()"
        (click)="toggleFollow()"
        [class.following-button]="user.is_following"
        [class.follow-back-button]="!user.is_following"
        class="follow-button">
        @if (user.is_following) {
          Following
        } @else if (user.is_following_back) {
          Follow Back
        } @else {
          Follow
        }
      </button>
    </div>
  }
</div>
