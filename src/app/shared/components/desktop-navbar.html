<nav
  class="sticky top-0 h-dvh flex flex-col border-r border-[color-mix(in_srgb,var(--mat-sys-on-surface)_12%,transparent)] bg-(--mat-sys-surface) p-3"
  aria-label="Desktop navigation"
>
  <div class="pt-4 mb-6 flex justify-center">
    <img src="/assets/img/wontulogo.svg" alt="Logo" class="h-24 w-24 object-contain" />
  </div>

  <mat-nav-list class="p-0!">
    @for (link of links; track link.path) {
      <a
        mat-list-item
        [routerLink]="link.path"
        routerLinkActive
        #rla="routerLinkActive"
        class="mb-1"
      >
        <mat-icon
          fontSet="material-symbols-outlined"
          matListItemIcon
          class="nav-icon nav-item-icon"
          [class.nav-icon-filled]="rla.isActive"
          [class.nav-item-active]="rla.isActive"
        >
          {{ link.icon }}
        </mat-icon>
        <span
          matListItemTitle
          class="nav-item-label tracking-normal!"
          [class.nav-item-active]="rla.isActive"
        >
          {{ link.label }}
        </span>
      </a>
    }
  </mat-nav-list>

  <div class="mt-auto pb-4">
    @if (!user()) {
      <a mat-flat-button routerLink="/sign-in" class="w-full! h-12!"> Sign In </a>
    } @else {
      <div
        class="flex items-center gap-3 px-4 py-2 border-t border-[color-mix(in_srgb,var(--mat-sys-on-surface)_12%,transparent)]"
      >
        @if (user()?.avatar) {
          <img [src]="user()?.avatar" alt="Avatar" class="h-8 w-8 rounded-full" />
        }
        <div class="flex flex-col overflow-hidden">
          <span class="text-sm font-medium text-(--mat-sys-on-surface) truncate">{{
            user()?.name
          }}</span>
          <span class="text-xs text-(--mat-sys-on-surface-variant) truncate"
            >@{{ user()?.username }}</span
          >
        </div>
        <button mat-icon-button (click)="logout()" class="ml-auto!">
          <mat-icon fontSet="material-symbols-outlined">logout</mat-icon>
        </button>
      </div>
    }
  </div>
</nav>
