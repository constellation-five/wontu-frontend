<mat-card class="merchant-card" (click)="onCardClick()">
  @if (imageUrl()) {
    <div class="merchant-card-image">
      <img [src]="imageUrl()" [alt]="merchantName()" />
    </div>
  }
  
  <div class="merchant-card-content">
    <app-category-label [category]="category()" />
    
    <h3 class="merchant-name mat-font-title-md mat-text-on-surface">
      {{ merchantName() }}
    </h3>
    
    <p class="arrival-time mat-font-label-md mat-text-on-surface-variant">
      {{ arrivalTime() }}
    </p>
    
    <p class="price mat-font-body-lg text-bold mat-text-on-surface">
      {{ priceRange() }}
    </p>
    
    <div class="stock-arrow-row">
      <p class="stock mat-font-label-lg mat-text-on-surface-variant">
        Stock: {{ stockLeft() }} left
      </p>
      
      <mat-icon fontSet="material-symbols-outlined" class="arrow-icon mat-text-on-primary-container">
        arrow_forward
      </mat-icon>
    </div>
  </div>
</mat-card>
