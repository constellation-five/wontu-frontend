<div class="page-header">
  <nav class="breadcrumb" *ngIf="breadcrumbs.length > 0">
    <ng-container *ngFor="let item of breadcrumbs; let last = last">
      <a 
        *ngIf="item.route && !last" 
        [routerLink]="item.route" 
        class="breadcrumb-link">
        {{ item.label }}
      </a>
      <span *ngIf="last" class="breadcrumb-current">{{ item.label }}</span>
      <span *ngIf="!last" class="breadcrumb-separator">/</span>
    </ng-container>
  </nav>

  <h1 class="page-title" *ngIf="!isLoading">{{ title }}</h1>
  <div class="title-skeleton" *ngIf="isLoading"></div>
</div>
