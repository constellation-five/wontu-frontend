<nav class="side-nav-container" aria-label="Desktop navigation">
  <div class="logo-container">
    <img src="/assets/img/wontulogo.svg" alt="Logo" class="logo-image" />
  </div>

  <mat-nav-list class="nav-list">
    @for (link of links; track link.path) {
      @if (!isProtectedRoute(link.path) || user()) {
        <a
          mat-list-item
          [routerLink]="link.path"
          routerLinkActive
          #rla="routerLinkActive"
          class="nav-item"
          [activated]="rla.isActive"
          (click)="blurItem($event)"
        >
          @if (link.path === '/profile' && user()?.avatar && !avatarError()) {
            <img
              [src]="user()?.avatar"
              alt="Avatar"
              (error)="onAvatarError()"
              matListItemIcon
              class="user-avatar"
              [class.user-avatar-active]="rla.isActive"
            />
          } @else {
            <mat-icon
              fontSet="material-symbols-outlined"
              matListItemIcon
              [class.nav-icon-filled]="rla.isActive"
            >
              {{ link.icon }}
            </mat-icon>
          }
          <span matListItemTitle class="nav-item-label">
            {{ link.label }}
          </span>
        </a>
      }
    }
  </mat-nav-list>

  @if (!user()) {
    <button matButton="filled" (click)="goToSignIn()" class="auth-button">
      <mat-icon fontSet="material-symbols-outlined" matListItemIcon> login </mat-icon>
      <span class="auth-label">Sign in</span>
    </button>
  } @else {
    <button matButton (click)="logout()" class="auth-button">
      <mat-icon fontSet="material-symbols-outlined" matListItemIcon> logout </mat-icon>
      Sign out
    </button>
  }
</nav>
