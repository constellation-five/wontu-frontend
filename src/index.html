<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wontu</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <script>
      (function () {
        var lang = localStorage.getItem('language');
        var isId =
          window.location.pathname.startsWith('/id/') || window.location.pathname === '/id';
        if (lang) {
          if (lang === 'id' && !isId) {
            window.location.replace('/id' + window.location.pathname + window.location.search);
          } else if (lang === 'en' && isId) {
            var newPath = window.location.pathname.replace(/^\/id\/?/, '/') || '/';
            window.location.replace(newPath + window.location.search);
          }
        } else if (isId) {
          var newPath = window.location.pathname.replace(/^\/id\/?/, '/') || '/';
          window.location.replace(newPath + window.location.search);
        }
      })();
    </script>
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
