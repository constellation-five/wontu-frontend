name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string
      - name: Inject Environment Secrets
        run: |
          sed -i "s/REVERB_KEY_PLACEHOLDER/${{ secrets.REVERB_KEY }}/g" src/environments/environment.prod.ts
          sed -i "s/VAPID_PUBLIC_KEY_PLACEHOLDER/${{ secrets.VAPID_PUBLIC_KEY }}/g" src/environments/environment.prod.ts
          sed -i "s/GOOGLE_MAPS_API_KEY_PLACEHOLDER/${{ secrets.GOOGLE_MAPS_API_KEY }}/g" src/environments/environment.prod.ts
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
      - name: Install dependencies and build project
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --dangerously-allow-all-builds
          pnpm run build
          mv dist/wontu-frontend/browser/en/* dist/wontu-frontend/browser/
          rm -rf dist/wontu-frontend/browser/en
          
          # Prevent root Service Worker from intercepting /id/* navigation requests
          if [ -f dist/wontu-frontend/browser/ngsw.json ]; then
            jq '.navigationUrls += [{"positive": false, "regex": "^\\\\/id\\\\/.*$"}]' dist/wontu-frontend/browser/ngsw.json > dist/wontu-frontend/browser/ngsw.tmp.json
            mv dist/wontu-frontend/browser/ngsw.tmp.json dist/wontu-frontend/browser/ngsw.json
          fi
      - name: Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_GLACIER_0F247FB00 }}
          action: 'upload'
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: './dist/wontu-frontend/browser'
          output_location: ''
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_GLACIER_0F247FB00 }}
          action: 'close'
          app_location: './dist/wontu-frontend/browser'
          github_id_token: ${{ steps.idtoken.outputs.result }}
